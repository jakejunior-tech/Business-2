<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — BOLD STORE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-container">
      <a href="index.html" class="logo">BOLD<span>STORE</span></a>
      <nav class="nav" id="mainNav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="admin-login.html" class="nav-link">Admin</a>
        <a href="contact.html" class="nav-link active">Contact</a>
      </nav>
      <div class="header-actions">
        <button class="cart-icon" id="cartIcon" onclick="openCartDrawer()">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="cart-count" id="cartCount">0</span>
        </button>
        <span class="admin-indicator" id="adminIndicator"></span>
        <button class="mobile-menu-btn" id="mobileMenuBtn">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <section class="contact-section">
      <h1>Report a Problem</h1>
      <p>Facing an issue? Let us know and we'll get back to you.</p>

      <form class="admin-form" id="contactForm" style="box-shadow:var(--shadow);">
        <div class="form-group">
          <label for="contactName">Your Name</label>
          <input type="text" id="contactName" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label for="contactEmail">Your Email</label>
          <input type="email" id="contactEmail" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="contactMessage">Message</label>
          <textarea id="contactMessage" placeholder="Describe your issue..." required></textarea>
        </div>
        <button type="submit" class="btn-primary">Submit Report</button>
      </form>

      <div class="contact-success" id="contactSuccess">
        Your report has been sent to Nengi &amp; Kufre. We'll get back to you soon!
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">
          <h3 class="footer-logo">BOLD<span>STORE</span></h3>
          <p>Authenticity is everything.</p>
        </div>
        <div class="footer-links">
          <p>&copy; 2026 BOLD STORE. All rights reserved.</p>
        </div>
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/contact.js"></script>
</body>
</html>
